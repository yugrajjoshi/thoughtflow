version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: thoughtflow
      POSTGRES_USER: thoughtflow
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 thoughtflow.asgi:application
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
